ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ru.glyph.server.ApplicationKt.module]
    }
}

database {
    url      = "jdbc:postgresql://localhost:5432/glyph"
    url      = ${?DATABASE_URL}
    user     = "postgres"
    user     = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
}
